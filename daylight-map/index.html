<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daylight Map</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header">
    <span class="title">Daylight</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>

  <canvas id="map"></canvas>

  <div class="time-control">
    <span class="time-label" id="time-label">Now</span>
    <div class="slider-track">
      <input type="range" id="time-slider" min="-720" max="720" value="0" step="1">
    </div>
    <button class="reset-btn" id="reset-time" title="Reset to now">NOW</button>
  </div>

  <div id="error"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
